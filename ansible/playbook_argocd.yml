---
# playbook_argocd.yml
# Phase 2 of 2: Bootstraps ArgoCD onto the running cluster.
# Must run AFTER all workers have joined (ArgoCD pods are scheduled on workers).
#
# Pinned to v2.x — ArgoCD v3.x init container uses 'cp --update=none' which
# requires GNU coreutils >= 9.1. Ubuntu 22.04 ships coreutils 8.32 (incompatible).
#
# Trigger:
#   vagrant provision k8s-master --provision-with argocd
- name: Bootstrap ArgoCD (Phase 2 — requires workers to be joined)
  hosts: all
  connection: local
  become: false
  become_user: vagrant
  vars:
    argocd_version: "v2.14.9"   # v3.x incompatible with Ubuntu 22.04 coreutils 8.32
    argocd_nodeport: 30080

  tasks:

    # -------------------------------------------------------------------------
    # 1. PRE-FLIGHT — verify at least one worker node is Ready.
    # -------------------------------------------------------------------------
    - name: Count Ready worker nodes
      ansible.builtin.shell: |
        kubectl get nodes \
          --selector='!node-role.kubernetes.io/control-plane' \
          --no-headers 2>/dev/null | grep -c 'Ready' || true
      register: worker_count
      changed_when: false

    - name: Fail if no workers are Ready
      ansible.builtin.fail:
        msg: >
          Pre-flight failed: no Ready worker nodes found.
          Ensure k8s-worker-1 and k8s-worker-2 have finished provisioning
          before running this playbook.
      when: worker_count.stdout | int == 0

    - name: Show Ready worker count
      ansible.builtin.debug:
        msg: "Pre-flight passed: {{ worker_count.stdout | trim }} Ready worker node(s) found."

    # -------------------------------------------------------------------------
    # 2. NAMESPACE
    # -------------------------------------------------------------------------
    - name: Create argocd namespace (idempotent)
      ansible.builtin.shell: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    # -------------------------------------------------------------------------
    # 3. INSTALL
    # Server-side apply avoids the 262144-byte annotation limit on large CRDs.
    # -------------------------------------------------------------------------
    - name: Install ArgoCD
      ansible.builtin.command: >
        kubectl apply -n argocd --server-side --force-conflicts
        -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
      register: argocd_install
      changed_when: '"configured" in argocd_install.stdout or "created" in argocd_install.stdout'

    # -------------------------------------------------------------------------
    # 4. EXPOSE — NodePort so the UI is reachable from the host network
    # -------------------------------------------------------------------------
    - name: Expose ArgoCD server as NodePort {{ argocd_nodeport }}
      ansible.builtin.shell: |
        kubectl patch svc argocd-server -n argocd \
          -p '{"spec":{"type":"NodePort","ports":[{"port":443,"targetPort":8080,"nodePort":{{ argocd_nodeport }}}]}}'
      changed_when: true

    # -------------------------------------------------------------------------
    # 5. VERIFY
    # -------------------------------------------------------------------------
    - name: Wait for ArgoCD server deployment to be available
      ansible.builtin.command: >
        kubectl wait --for=condition=available deployment argocd-server
        -n argocd --timeout=300s
      retries: 3
      delay: 20
      register: argocd_ready
      until: argocd_ready.rc == 0

    - name: Show ArgoCD pod placement (confirms worker scheduling)
      ansible.builtin.command: kubectl get pods -n argocd -o wide
      register: argocd_pods
      changed_when: false

    - name: Print pod placement
      ansible.builtin.debug:
        var: argocd_pods.stdout_lines

    - name: Print ArgoCD access information
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "  ArgoCD is ready!"
          - "  URL:  https://192.168.242.10:{{ argocd_nodeport }}"
          - "  User: admin"
          - "  Pass: kubectl get secret argocd-initial-admin-secret \\"
          - "          -n argocd -o jsonpath='{.data.password}' | base64 -d"
          - "=============================================="

    # -------------------------------------------------------------------------
    # 6. GITOPS BOOTSTRAP — apply root-app.yaml from ride-hail-gitops
    # Fetched directly from GitHub; no synced-folder dependency.
    # This registers the App of Apps and triggers full cluster reconciliation.
    # -------------------------------------------------------------------------
    - name: Apply GitOps root app (App of Apps)
      ansible.builtin.command: >
        kubectl apply -n argocd
        -f https://raw.githubusercontent.com/ama2352/ride-hail-gitops/main/root-app.yaml
      register: root_app
      changed_when: '"configured" in root_app.stdout or "created" in root_app.stdout'

    - name: Print GitOps bootstrap result
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "  GitOps root app applied: {{ root_app.stdout | trim }}"
          - "  ArgoCD will now reconcile the full platform."
          - "  Watch progress: https://192.168.242.10:{{ argocd_nodeport }}"
          - "=============================================="
