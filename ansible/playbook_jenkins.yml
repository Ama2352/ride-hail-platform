---
# =============================================================================
# playbook_jenkins.yml
# Installs Docker and runs Jenkins controller as a persistent container.
#
# Architecture: DooD (Docker-outside-of-Docker)
#   - Jenkins container mounts /var/run/docker.sock so it can spawn
#     sibling CI agent containers on the same host Docker daemon.
#   - JENKINS_HOME path is identical on host AND inside the container
#     (/data/jenkins) so Docker path resolution works correctly when
#     pipelines mount workspace directories into sibling containers.
#
# Sections:
#   1. Docker Install        — official Docker CE repository
#   2. Docker Post-Install   — add vagrant user to docker group
#   3. Jenkins Preparation   — create persistent data directory
#   4. Jenkins Container     — pull image + run with DooD config
# =============================================================================
- name: Install Docker and Run Jenkins Controller
  hosts: all
  connection: local
  become: true
  vars:
    jenkins_image: "jenkins/jenkins:lts-jdk17"
    jenkins_home: "/data/jenkins"
    jenkins_container: "jenkins"
    jenkins_port: 8080
    jenkins_agent_port: 50000
    # JVM heap tuned for 3 GB VM; leaves ~2 GB for Docker sibling containers
    java_opts: >-
      -Xms512m
      -Xmx1024m
      -Djava.awt.headless=true
      -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.HEARTBEAT_CHECK_INTERVAL=86400

  tasks:

    # -------------------------------------------------------------------------
    # 1. DOCKER INSTALL
    # -------------------------------------------------------------------------
    - name: Install Docker apt dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker CE packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # -------------------------------------------------------------------------
    # 2. DOCKER POST-INSTALL
    # -------------------------------------------------------------------------
    - name: Add vagrant user to docker group (idempotent)
      ansible.builtin.user:
        name: vagrant
        groups: docker
        append: true

    # -------------------------------------------------------------------------
    # 3. JENKINS DATA DIRECTORY
    # UID 1000 is the jenkins user inside the official jenkins/jenkins image.
    # -------------------------------------------------------------------------
    - name: Create Jenkins persistent home directory
      ansible.builtin.file:
        path: "{{ jenkins_home }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"

    # -------------------------------------------------------------------------
    # 4. JENKINS CONTAINER
    # -------------------------------------------------------------------------
    - name: Pull Jenkins image
      community.docker.docker_image:
        name: "{{ jenkins_image }}"
        source: pull

    - name: Stop and remove any existing Jenkins container (idempotent)
      community.docker.docker_container:
        name: "{{ jenkins_container }}"
        state: absent
      ignore_errors: true

    - name: Get Docker socket GID for DooD
      ansible.builtin.command: stat -c '%g' /var/run/docker.sock
      register: docker_gid
      changed_when: false

    - name: Run Jenkins controller container
      community.docker.docker_container:
        name: "{{ jenkins_container }}"
        image: "{{ jenkins_image }}"
        state: started
        restart_policy: unless-stopped
        groups:
          - "{{ docker_gid.stdout }}"
        published_ports:
          - "{{ jenkins_port }}:8080"
          - "{{ jenkins_agent_port }}:50000"
        volumes:
          - "{{ jenkins_home }}:{{ jenkins_home }}"
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/usr/bin/docker:/usr/bin/docker:ro"
        env:
          JENKINS_HOME: "{{ jenkins_home }}"
          JAVA_OPTS: "{{ java_opts }}"
          JENKINS_OPTS: "--httpPort=8080"

    - name: Print Jenkins access information
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "  Jenkins controller started!"
          - "  URL:  http://192.168.242.13:{{ jenkins_port }}"
          - "  Initial unlock key:"
          - "    docker exec {{ jenkins_container }}"
          - "      cat /var/jenkins_home/secrets/initialAdminPassword"
          - "=============================================="
